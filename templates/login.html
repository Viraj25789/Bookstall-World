{% extends 'base.html' %}
{% block content %}
<div class="card modern-card mx-auto mt-5 border-0" style="max-width: 420px; border-radius: 30px;">
    <div class="card-body p-5">
        <div class="text-center mb-4">
            <div class="d-inline-block bg-light rounded-circle p-3 mb-3 shadow-sm">
                <i class="bi bi-emoji-sunglasses display-4 text-gradient"></i>
            </div>
            <h3 class="fw-bold text-dark">Welcome Back!</h3>
            <p class="text-muted small fw-medium">Open the door to ideas and everyday essentials</p>
        </div>
        <form method="POST" action="/login">
            <div class="mb-3">
                <input type="text" name="username" class="form-control form-control-lg bg-light border-0 rounded-pill px-4 shadow-sm" placeholder="👤 Username" required>
            </div>
            <div class="mb-4">
                <input type="password" name="password" class="form-control form-control-lg bg-light border-0 rounded-pill px-4 shadow-sm" placeholder="🔒 Password" required>
            </div>
            <button type="submit" class="btn btn-magic btn-lg w-100 fw-bold shadow-sm">Let's Go 🚀</button>
        </form>
        <div class="text-center mt-4">
            <p class="text-muted fw-medium small">New here? <a href="/register" class="text-gradient text-decoration-none fw-bold ms-1">Create an account</a></p>
        </div>
    </div>
</div>
{% endblock %}
